<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NexusEngine LOD Showcase</title><style>html,body{margin:0;width:100%;height:100%;display:grid;place-items:center;background:#070b0f;color:#edf5f7;font:14px system-ui}#s{padding:20px}</style></head><body><div id="s">Loading NexusEngine world LOD showcase…</div><script>(async()=>{try{const parts=await Promise.all([0,1,2,3,4,5].map(i=>fetch(`./payload/p${i}.txt`).then(r=>{if(!r.ok)throw Error(`payload ${i}: ${r.status}`);return r.text()})));const b=parts.join('');const u=Uint8Array.from(atob(b),c=>c.charCodeAt(0));const ds=new DecompressionStream('gzip');const html=await new Response(new Blob([u]).stream().pipeThrough(ds)).text();document.open();document.write(html);document.close()}catch(e){document.querySelector('#s').textContent='Failed to load showcase: '+e.message;console.error(e)}})();</script></body></html>
